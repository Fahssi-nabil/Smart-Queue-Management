# =============================
# APPLICATION SETTINGS
# =============================
spring.application.name=smart-q
server.port=8080

# =============================
# DATABASE CONFIGURATION
# =============================
spring.datasource.url=jdbc:postgresql://smart-q-db:5432/smartqdb
spring.datasource.username=smartuser
spring.datasource.password=smartpass
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / HIBERNATE
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# =============================
# LOGGING
# =============================
logging.level.org.springframework.security=DEBUG
logging.level.com.smartq=DEBUG

# =============================
# JWT Configuration
# =============================
jwt.secret=this-is-my-very-secret-key-for-jwt-signing-32chars
jwt.expiration=86400000
